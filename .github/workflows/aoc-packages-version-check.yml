name: AOC Package Version Check
on:
  pull_request:
    paths:
      - 'src/aoc/**'

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check @aoc-enterprise/runtime version bumped
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- src/aoc/enterprise/ | wc -l)
          if [ "$CHANGED" -eq 0 ]; then
            echo "No changes in src/aoc/enterprise/ — skipping version check."
            exit 0
          fi
          BASE_VERSION=$(git show origin/${{ github.base_ref }}:src/aoc/enterprise/package.json | node -e "process.stdin.resume();let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).version))")
          CURRENT_VERSION=$(node -e "console.log(require('./src/aoc/enterprise/package.json').version)")
          if [ "$BASE_VERSION" = "$CURRENT_VERSION" ]; then
            echo "ERROR: src/aoc/enterprise changed but version not bumped (still $CURRENT_VERSION)"
            echo "Bump the version in src/aoc/enterprise/package.json before merging."
            exit 1
          fi
          echo "Version bumped: $BASE_VERSION -> $CURRENT_VERSION"

      - name: Check @aoc/protocol version bumped
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- src/aoc/protocol/ | wc -l)
          if [ "$CHANGED" -eq 0 ]; then
            echo "No changes in src/aoc/protocol/ — skipping version check."
            exit 0
          fi
          BASE_VERSION=$(git show origin/${{ github.base_ref }}:src/aoc/protocol/package.json | node -e "process.stdin.resume();let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).version))")
          CURRENT_VERSION=$(node -e "console.log(require('./src/aoc/protocol/package.json').version)")
          if [ "$BASE_VERSION" = "$CURRENT_VERSION" ]; then
            echo "ERROR: src/aoc/protocol changed but version not bumped (still $CURRENT_VERSION)"
            echo "Bump the version in src/aoc/protocol/package.json before merging."
            exit 1
          fi
          echo "Version bumped: $BASE_VERSION -> $CURRENT_VERSION"
